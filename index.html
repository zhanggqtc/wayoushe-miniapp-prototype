<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>高校瓦友社小程序 H5 交互稿</title>
  <style>
    :root {
      --bg: #080d12;
      --panel: #101923;
      --panel-2: #16212d;
      --line: rgba(255,255,255,.10);
      --line-2: rgba(255,255,255,.18);
      --text: #f4f7fb;
      --muted: #8d9aaa;
      --red: #ff4655;
      --red-2: #db3544;
      --cyan: #75f4ff;
      --green: #57e39b;
      --amber: #ffcc66;
      --radius: 22px;
      --shadow: 0 24px 70px rgba(0,0,0,.42);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,70,85,.22), transparent 26%),
        radial-gradient(circle at 82% 20%, rgba(117,244,255,.12), transparent 28%),
        linear-gradient(135deg, #070b10, #111b26 48%, #070b10);
      overflow-x: hidden;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    .page {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(360px, 560px);
      gap: 42px;
      align-items: center;
      justify-content: center;
      padding: 36px;
    }

    .brief {
      max-width: 520px;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #c8d3df;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      font-size: 13px;
    }
    .mark {
      width: 10px;
      height: 10px;
      background: var(--red);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }
    h1 {
      margin: 22px 0 14px;
      font-size: clamp(38px, 5vw, 66px);
      line-height: .96;
      letter-spacing: -0.055em;
    }
    .brief p {
      margin: 0;
      color: #aeb8c5;
      font-size: 17px;
      line-height: 1.72;
      max-width: 31em;
    }
    .brief-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }
    .pill-button {
      height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      color: #071016;
      background: var(--text);
      font-weight: 700;
    }
    .pill-button.secondary {
      color: var(--text);
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line-2);
    }
    .notes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 34px;
    }
    .note {
      min-height: 108px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.045);
    }
    .note strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .note span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .phone-shell {
      width: min(390px, calc(100vw - 32px));
      height: min(844px, calc(100dvh - 32px));
      min-height: 720px;
      border-radius: 42px;
      padding: 12px;
      background: linear-gradient(145deg, rgba(255,255,255,.22), rgba(255,255,255,.05));
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.35);
      position: relative;
    }
    .phone {
      height: 100%;
      overflow: hidden;
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(255,70,85,.14), transparent 24%),
        var(--bg);
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 116px;
      height: 26px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: #06090d;
      z-index: 10;
    }
    .statusbar {
      height: 38px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 24px 7px;
      color: rgba(255,255,255,.76);
      font-size: 12px;
      letter-spacing: .02em;
      position: relative;
      z-index: 12;
    }
    .app {
      height: calc(100% - 38px);
      display: flex;
      flex-direction: column;
    }
    .screen {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 18px 16px 92px;
    }
    .screen::-webkit-scrollbar { display: none; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .school-name {
      font-size: 25px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.05em;
    }
    .school-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--red), #5c1520);
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
    }
    .campus-card {
      margin-bottom: 16px;
      border-radius: 27px;
      padding: 16px;
      background:
        radial-gradient(circle at 82% 0%, rgba(255,204,102,.16), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.105), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 16px 36px rgba(0,0,0,.22);
    }
    .campus-main {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }
    .campus-title {
      font-size: 24px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: -0.055em;
    }
    .campus-verify {
      margin-top: 6px;
      color: #b9c5d2;
      font-size: 12px;
    }
    .level-badge {
      padding: 7px 10px;
      border-radius: 999px;
      color: #071016;
      background: linear-gradient(135deg, #b9f7ff, #6aa9ff);
      font-weight: 950;
      font-size: 12px;
      white-space: nowrap;
    }
    .campus-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }
    .campus-stat {
      padding: 11px;
      border-radius: 16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
    }
    .campus-stat b {
      display: block;
      font-size: 18px;
      letter-spacing: -0.04em;
    }
    .campus-stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
    }
    .pioneer-line {
      margin-top: 10px;
      padding: 10px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 16px;
      background: rgba(255,70,85,.10);
      border: 1px solid rgba(255,70,85,.18);
    }
    .pioneer-line strong { font-size: 12px; }
    .pioneer-line span { color: #b9c5d2; font-size: 11px; }
    .group-line {
      margin-top: 10px;
      padding: 11px;
      border-radius: 16px;
      background: rgba(117,244,255,.09);
      border: 1px solid rgba(117,244,255,.18);
    }
    .group-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .group-head strong,
    .pioneer-detail strong { display: block; font-size: 12px; }
    .group-head span,
    .pioneer-detail span { display: block; margin-top: 3px; color: #b9c5d2; font-size: 11px; line-height: 1.4; }
    .group-choice {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .group-choice.show { display: grid; }
    .choice-button {
      min-height: 46px;
      border-radius: 14px;
      color: var(--text);
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 900;
      font-size: 12px;
    }
    .choice-button.qq { background: rgba(117,244,255,.14); }
    .choice-button.wechat { background: rgba(87,227,155,.14); }
    .campus-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .campus-action-button {
      min-height: 40px;
      border-radius: 14px;
      color: var(--text);
      background: rgba(255,255,255,.085);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 12px;
      font-weight: 900;
    }
    .achievement-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .achievement-item {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 9px;
      align-items: center;
      padding: 9px;
      border-radius: 14px;
      background: rgba(255,255,255,.055);
    }
    .achievement-item b {
      color: var(--amber);
      font-size: 16px;
      letter-spacing: -0.03em;
    }
    .achievement-item span {
      margin: 0;
      color: #d6e0eb;
      font-size: 11px;
      line-height: 1.35;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      padding: 14px;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(10px);
    }
    .modal-backdrop.show { display: flex; }
    .modal-sheet {
      width: 100%;
      max-height: 74%;
      overflow-y: auto;
      border-radius: 26px;
      padding: 18px;
      background:
        radial-gradient(circle at 86% 6%, rgba(255,70,85,.16), transparent 32%),
        #101923;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 28px 80px rgba(0,0,0,.5);
    }
    .modal-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .modal-title h3 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.045em;
    }
    .modal-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .close-button {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      color: var(--text);
      background: rgba(255,255,255,.09);
      font-weight: 900;
    }
    .rank-list,
    .member-list { display: grid; gap: 8px; }
    .rank-row {
      display: grid;
      grid-template-columns: 44px 1fr 38px;
      gap: 9px;
      align-items: center;
      padding: 9px;
      border-radius: 14px;
      background: rgba(255,255,255,.055);
    }
    .rank-row strong,
    .rank-row span { font-size: 11px; }
    .rank-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      overflow: hidden;
    }
    .rank-track i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--amber));
    }
    .member-row {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 15px;
      background: rgba(0,0,0,.2);
      border: 1px solid rgba(255,255,255,.07);
    }
    .member-order {
      color: var(--amber);
      font-size: 12px;
      font-weight: 950;
    }
    .member-row strong { display: block; font-size: 12px; }
    .member-row span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
    .member-rank {
      padding: 5px 7px;
      border-radius: 999px;
      color: #071016;
      background: #b9f7ff;
      font-size: 10px;
      font-weight: 900;
    }
    .hero-card {
      border-radius: 28px;
      padding: 18px;
      background:
        radial-gradient(circle at 78% 18%, rgba(117,244,255,.18), transparent 32%),
        linear-gradient(145deg, rgba(255,70,85,.2), rgba(255,255,255,.06) 42%, rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 18px 40px rgba(0,0,0,.24);
      position: relative;
      overflow: hidden;
    }
    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -18px -60px auto;
      width: 150px;
      height: 150px;
      background: rgba(255,70,85,.24);
      filter: blur(34px);
      border-radius: 999px;
    }
    .module-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    .module-title {
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.03em;
    }
    .module-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .tag {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      color: #071016;
      background: var(--cyan);
      font-weight: 800;
      font-size: 11px;
    }
    .skins {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      position: relative;
      z-index: 1;
    }
    .skin-card {
      min-height: 118px;
      border-radius: 18px;
      padding: 10px;
      color: var(--text);
      text-align: left;
      background: linear-gradient(160deg, rgba(255,255,255,.16), rgba(255,255,255,.045));
      border: 1px solid rgba(255,255,255,.12);
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
      position: relative;
      overflow: hidden;
    }
    .skin-card:active { transform: scale(.98); }
    .skin-card.active {
      border-color: rgba(255,70,85,.8);
      background: linear-gradient(160deg, rgba(255,70,85,.24), rgba(255,255,255,.06));
    }
    .weapon-art {
      height: 48px;
      margin: 8px 0 14px;
      position: relative;
    }
    .weapon-art::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 18px;
      width: 68px;
      height: 13px;
      border-radius: 2px;
      transform: skewX(-18deg);
      background: linear-gradient(90deg, #e8edf4, #647081);
      box-shadow: 24px -10px 0 -3px rgba(255,70,85,.9), 46px 10px 0 -5px rgba(117,244,255,.85);
    }
    .skin-name {
      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .skin-type {
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
    }
    .candidate-tag {
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 4px 6px;
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      color: #dbe6f2;
      font-size: 9px;
      font-weight: 850;
    }
    .skin-card.active .candidate-tag {
      color: #071016;
      background: var(--amber);
    }
    .rule-copy {
      margin-top: 10px;
      color: #c5d0dc;
      font-size: 11px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }
    .slots {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .slot-card {
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.09);
    }
    .slot-card.pending {
      border-color: rgba(255,204,102,.36);
      background: linear-gradient(145deg, rgba(255,204,102,.12), rgba(0,0,0,.22));
    }
    .slot-card.locked {
      border-color: rgba(87,227,155,.34);
      background: linear-gradient(145deg, rgba(87,227,155,.12), rgba(0,0,0,.22));
    }
    .slot-card.empty {
      border-style: dashed;
      opacity: .92;
    }
    .slot-top {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 9px;
      align-items: start;
    }
    .task-line {
      margin-top: 9px;
      color: #c7d2de;
      font-size: 11px;
      line-height: 1.35;
    }
    .task-progress {
      margin-top: 8px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      overflow: hidden;
    }
    .task-progress span {
      display: block;
      height: 100%;
      width: 60%;
      border-radius: inherit;
      background: var(--amber);
    }
    .slot-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 16px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.08);
    }
    .slot-index {
      width: 24px;
      height: 24px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.10);
      font-size: 11px;
      font-weight: 800;
    }
    .slot-title { font-size: 12px; font-weight: 800; }
    .slot-desc { margin-top: 2px; color: var(--muted); font-size: 10px; }
    .mini-status {
      padding: 5px 8px;
      border-radius: 999px;
      color: #071016;
      background: var(--green);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }
    .mini-status.pending { color: var(--text); background: rgba(255,255,255,.11); }
    .cta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .cta {
      height: 42px;
      border-radius: 15px;
      color: #071016;
      background: var(--red);
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(255,70,85,.22);
    }
    .cta.ghost {
      color: var(--text);
      background: rgba(255,255,255,.08);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,.13);
    }
    .section {
      margin-top: 18px;
      border-radius: var(--radius);
      padding: 16px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.09);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-size: 17px; font-weight: 900; letter-spacing: -0.03em; }
    .link { color: #c4d1df; font-size: 12px; background: transparent; padding: 0; }
    .radar-list { display: grid; gap: 10px; }
    .activity {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 11px;
      align-items: center;
      padding: 10px;
      border-radius: 16px;
      background: rgba(0,0,0,.20);
    }
    .date-block {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      background: rgba(255,70,85,.16);
      border: 1px solid rgba(255,70,85,.26);
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.05;
      color: #ffd5d9;
      font-weight: 900;
      font-size: 12px;
    }
    .activity-name { font-size: 13px; font-weight: 850; }
    .activity-meta { margin-top: 4px; color: var(--muted); font-size: 11px; }
    .state-chip {
      padding: 6px 8px;
      border-radius: 999px;
      color: #071016;
      background: var(--amber);
      font-weight: 900;
      font-size: 10px;
      white-space: nowrap;
    }
    .campus-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      padding: 14px;
      min-height: 82px;
      border-radius: 17px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.11), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.09);
    }
    .metric b { display: block; font-size: 22px; letter-spacing: -0.04em; }
    .metric span { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
    .points-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 15px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 88% 12%, rgba(255,204,102,.2), transparent 34%),
        rgba(255,255,255,.055);
      border: 1px solid rgba(255,204,102,.18);
    }
    .points-card b {
      display: block;
      font-size: 26px;
      letter-spacing: -0.05em;
    }
    .points-card span {
      display: block;
      margin-top: 4px;
      color: #b9c5d2;
      font-size: 11px;
      line-height: 1.4;
    }
    .mall-button {
      height: 36px;
      padding: 0 12px;
      border-radius: 13px;
      background: var(--amber);
      color: #071016;
      font-weight: 950;
      white-space: nowrap;
    }
    .mall-hero {
      border-radius: 26px;
      padding: 18px;
      background:
        radial-gradient(circle at 80% 18%, rgba(255,204,102,.24), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.11), rgba(255,255,255,.04));
      border: 1px solid rgba(255,204,102,.2);
    }
    .mall-hero h2 {
      margin: 0;

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function toggleGroupChoice() {
      const panel = document.getElementById('groupChoice');
      if (panel) panel.classList.toggle('show');
    }

    function launchGroup(type) {
      showToast('拉起' + type + '加群流程');

    function openModal(content) {
      const backdrop = document.getElementById('modalBackdrop');
      const sheet = document.getElementById('modalSheet');
      if (!backdrop || !sheet) return;
      sheet.innerHTML = content;
      backdrop.classList.add('show');
    }

    function closeModal(event) {
      if (event && event.currentTarget && event.target !== event.currentTarget) return;
      const backdrop = document.getElementById('modalBackdrop');
      if (backdrop) backdrop.classList.remove('show');
    }

    function openPioneerModal() {

            <button class="product-card" onclick="showToast('进入商品详情')"><div class="product-art"></div><strong>线下赛应援包</strong><small>剩余 12 · 先锋活动物料</small><div class="product-price"><b>2,000 积分</b><span class="exchange-button">详情</span></div></button>

    function buddy() {

    function mine() {
      screen.innerHTML = `
        <div class="topbar">

            <div><h2>深大认证瓦友</h2><p>高校特权已认证 · 本校先锋：陈同学</p></div>

        <section class="section">
          <div class="points-card">

            <div class="template-item"><strong>社交记录</strong><span>3 个收藏，1 个名片交换待确认</span></div>

    function setTab(name) {
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.tab === name));
      if (name === 'home') home();
      if (name === 'activity') activity();
      if (name === 'buddy') buddy();
      if (name === 'mine') mine();
    }

    function selectSkin(name) {
      document.querySelectorAll('.skin-card').forEach(card => card.classList.remove('active'));
      event.currentTarget.classList.add('active');
      showToast('已选择：' + name);
    }

    tabs.forEach(tab => tab.addEventListener('click', () => setTab(tab.dataset.tab)));
    home();
  </script>
</body>
</html>
